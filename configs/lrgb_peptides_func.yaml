dataset: "Peptides-func"
domain: "lrgb"
task_type: "classification"
metric: "ap"
num_outputs: 10
node_in_dim: 9     # Peptides atom feature dim
edge_in_dim: 3     # Peptides bond feature dim

d_model: 256
n_layers: 8
d_state: 32
mimo_rank: 4
dropout: 0.1
use_virtual_node: true
gradient_checkpointing: true

lr: 0.0005
weight_decay: 1e-5
min_lr: 1e-6
batch_size: 32
accum_steps: 4    # effective batch = 32 * 4 = 128
epochs: 200
patience: 30

use_wandb: false
save_path: "checkpoints/edgemamba3_peptides_func.pt"
