dataset: "Peptides-func"
domain: "lrgb"
task_type: "classification"
metric: "ap"
num_outputs: 10
node_in_dim: 9     # Peptides atom feature dim
edge_in_dim: 3     # Peptides bond feature dim

d_model: 128
n_layers: 4
d_state: 32
mimo_rank: 4
dropout: 0.05
drop_path: 0.1
use_virtual_node: true
gradient_checkpointing: false

lr: 0.0003
weight_decay: 1e-4
beta2: 0.95
grad_clip: 1.0
scheduler: "onecycle"
pct_start: 0.1
batch_size: 256
accum_steps: 1    # effective batch = 256 (more updates per epoch)
epochs: 150
patience: 30
use_pos_weight: true

use_wandb: false
save_path: "checkpoints/edgemamba3_peptides_func.pt"
