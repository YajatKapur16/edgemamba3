dataset: "Peptides-func"
domain: "lrgb"
task_type: "classification"
metric: "ap"
num_outputs: 10
node_in_dim: 9     # Peptides atom feature dim
edge_in_dim: 3     # Peptides bond feature dim

d_model: 128
n_layers: 6
d_state: 32
mimo_rank: 4
dropout: 0.1
drop_path: 0.0
use_virtual_node: false
gradient_checkpointing: false

lr: 0.0005
weight_decay: 1e-5
min_lr: 1e-6
beta2: 0.999
grad_clip: 1.0
batch_size: 128
epochs: 200
patience: 30

use_wandb: false
save_path: "checkpoints/edgemamba3_peptides_func.pt"
