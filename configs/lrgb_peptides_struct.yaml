dataset: "Peptides-struct"
domain: "lrgb"
task_type: "regression"
metric: "mae"
num_outputs: 11
node_in_dim: 9
edge_in_dim: 3

d_model: 128
n_layers: 6
d_state: 32
mimo_rank: 4
dropout: 0.1

lr: 0.0005
weight_decay: 1e-5
min_lr: 1e-6
batch_size: 32
accum_steps: 4    # effective batch = 32 * 4 = 128
epochs: 200
patience: 30

gradient_checkpointing: true

use_wandb: false
save_path: "checkpoints/edgemamba3_peptides_struct.pt"
